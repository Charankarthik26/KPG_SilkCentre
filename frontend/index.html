<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KPG Silk Centre - your one stop dress shop here</title>
  <script>
    window.onerror = function (msg, url, line, col, error) {
      document.body.innerHTML = `<div style="background: #1a0000; color: #ff5555; padding: 40px; font-family: sans-serif; height: 100vh;">
        <h1 style="border-bottom: 2px solid #330000; padding-bottom: 10px;">🚨 Frontend Crash Detected</h1>
        <p style="font-weight: bold; font-size: 1.2rem;">${msg}</p>
        <div style="background: #000; padding: 15px; border-radius: 8px; margin-top: 20px; font-family: monospace;">
          <p>URL: ${url}</p>
          <p>Line: ${line} | Column: ${col}</p>
          ${error && error.stack ? `<details style="margin-top: 10px;"><summary>View Stack Trace</summary><pre style="white-space: pre-wrap; font-size: 0.8rem;">${error.stack}</pre></details>` : ''}
        </div>
        <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #ff5555; color: white; border: none; border-radius: 5px; cursor: pointer;">Try Refresh</button>
      </div>`;
      return false;
    };
    window.addEventListener('unhandledrejection', function (event) {
      console.error('Unhandled rejection:', event.reason);
    });
  </script>
</head>

<body>
  <div id="root">
    <div
      style="font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #0a0a0a; color: #D4AF37;">
      <div style="text-align: center;">
        <h2>Connecting to KPG Silk Centre...</h2>
        <p style="color: #A1A1AA; font-size: 0.9rem;">If this screen stays for more than 5 seconds, check the console
          (F12) for errors.</p>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
